# DESTINATION: plugins/MythicMobs/Items/CustomEnchants.yml
# 10 custom enchantment "books" - apply via right-click on a target item.
# (MythicMobs doesn't natively register vanilla enchantments; instead we use
# named items that trigger Skills on hit.)

lifesteal_book:
  Id: ENCHANTED_BOOK
  Display: '&c&lEnchant: Lifesteal'
  Lore:
    - '&7Apply to a sword.'
    - '&7Heals 5% of damage dealt.'
    - '&7Max level: 5'
    - '&7Upgrade cost: $2500'
  Options:
    HideFlags: true

vampire_book:
  Id: ENCHANTED_BOOK
  Display: '&4&lEnchant: Vampire'
  Lore:
    - '&7Apply to a sword.'
    - '&7Lifesteal 10% + Blindness 1s'
    - '&7Conflicts with: Lifesteal'
    - '&7Upgrade cost: $5000'

berserk_book:
  Id: ENCHANTED_BOOK
  Display: '&6&lEnchant: Berserk'
