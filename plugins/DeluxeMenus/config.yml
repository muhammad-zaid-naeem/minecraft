# DeluxeMenus 1.14.1-Release main configuration file
#
# A full wiki on how to use this plugin can be found at:
# https://wiki.helpch.at/helpchat-plugins/deluxemenus

use_admin_commands_in_menus_list: false
menus_list_page_size: 10
metas_list_page_size: 15
# Whether to check for updates on startup.
check_updates: true

# Debug logging.
debug: HIGHEST

# Whether to use the soft-depend hooks (auto-detected, leave true).
hook:
  placeholderapi: true
  vault: true

# GUI menus are loaded from gui_menus/ - one per file.
# Add filenames here so the plugin loads them.
gui_menus:
  main:
    file: main.yml
  warps:
    file: warps.yml
  profile:
    file: profile.yml
  shop:
    file: shop.yml
  rtp:
    file: rtp.yml
