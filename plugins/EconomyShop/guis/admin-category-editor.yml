# Admin Category Editor GUI Configuration
size: 54
title: "&6%category%"
listing-slots: "0-44"

filler:
  enabled: true
  material: BLACK_STAINED_GLASS_PANE
  name: " "
  slots: "45-53"

items:
  back:
    slot: 48
    material: SPECTRAL_ARROW
    name: "&eBack"
    lore:
      - "&7Return to the category list."

  add-item:
    slot: 49
    material: EMERALD
    name: "&aAdd Item from Hand"
    lore:
      - "&7Hold an item in your main hand"
      - "&7and click to add it."

  prev-page:
    slot: 45
    material: ARROW
    name: "&ePrevious Page"
    lore:
      - "&7Go to the previous page."

  next-page:
    slot: 53
    material: ARROW
    name: "&eNext Page"
    lore:
      - "&7Go to the next page."

  info:
    slot: 47
    material: BOOK
    name: "&6Help"
    lore:
      - "&7Left-click an item to edit."
      - "&7Right-click to toggle enabled."
      - "&7Shift-click to delete."
