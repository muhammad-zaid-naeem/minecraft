# General tab
dashboard-general-tax-name: "&6Sales Tax"
dashboard-general-tax-desc1: "&7Percentage tax added on top of all"
dashboard-general-tax-desc2: "&7shop purchases. The buyer pays the"
dashboard-general-tax-desc3: "&7item price plus this tax."
dashboard-general-tax-desc4: "&7Requires the Sales Tax module."
dashboard-general-cost-name: "&6Creation Cost"
dashboard-general-cost-desc1: "&7One-time fee charged when a player"
dashboard-general-cost-desc2: "&7creates a new chest shop. Set to 0"
dashboard-general-cost-desc3: "&7to allow free shop creation."
dashboard-general-maxshops-name: "&6Max Shops/Player"
dashboard-general-maxshops-desc1: "&7Maximum number of chest shops a"
dashboard-general-maxshops-desc2: "&7single player can own at once."
dashboard-general-maxshops-desc3: "&7Can be overridden per-player via"
dashboard-general-maxshops-desc4: "&7LuckPerms meta."
dashboard-general-sellmult-name: "&6Sell Multiplier"
dashboard-general-sellmult-desc1: "&7Sell price = buy price x this value."
dashboard-general-sellmult-desc2: "&71.0 = players sell at full price,"
dashboard-general-sellmult-desc3: "&70.5 = they get half. Lower values"
dashboard-general-sellmult-desc4: "&7act as a natural money sink."
dashboard-general-minprice-name: "&6Min Price"
dashboard-general-minprice-desc1: "&7The lowest price any admin or player"
dashboard-general-minprice-desc2: "&7can set for a shop item. Prevents"
dashboard-general-minprice-desc3: "&7items from being listed for free"
dashboard-general-minprice-desc4: "&7or near-zero prices."
dashboard-general-maxprice-name: "&6Max Price"
dashboard-general-maxprice-desc1: "&7The highest price any shop item can"
dashboard-general-maxprice-desc2: "&7be set to. Prevents absurdly high"
dashboard-general-maxprice-desc3: "&7prices that could break the economy."
dashboard-general-txtax-name: "&6Transaction Tax"
dashboard-general-txtax-desc1: "&7Tax percentage deducted from chest"
dashboard-general-txtax-desc2: "&7shop transactions. The seller receives"
dashboard-general-txtax-desc3: "&7the sale price minus this tax."
dashboard-general-txtax-desc4: "&7Acts as a money sink."
dashboard-general-sensitivity-name: "&6Dynamic Sensitivity"
dashboard-general-sensitivity-desc1: "&7Controls how strongly each trade"
dashboard-general-sensitivity-desc2: "&7affects the dynamic price multiplier."
dashboard-general-sensitivity-desc3: "&7Higher = prices swing faster."
dashboard-general-sensitivity-desc4: "&7Only used with the Multiplier model."

# Modules tab
dashboard-module-adminshop-name: "&6Admin Shop"
dashboard-module-adminshop-desc1: "&7The server-run GUI shop opened with"
dashboard-module-adminshop-desc2: "&7/shop. Disable if you only want"
dashboard-module-adminshop-desc3: "&7player chest shops. Chest shops,"
dashboard-module-adminshop-desc4: "&7admin commands, and dashboard stay active."
dashboard-module-dynprice-name: "&6Dynamic Pricing"
dashboard-module-dynprice-desc1: "&7Prices fluctuate based on supply"
dashboard-module-dynprice-desc2: "&7and demand. When players buy, prices"
dashboard-module-dynprice-desc3: "&7rise. When they sell, prices drop."
dashboard-module-dynprice-desc4: "&7Disabling locks prices to base values."
dashboard-module-sell-name: "&6Sell to Shop"
dashboard-module-sell-desc1: "&7Allows players to sell items back"
dashboard-module-sell-desc2: "&7to the server shop. Disabling hides"
dashboard-module-sell-desc3: "&7the sell button from the shop GUI."
dashboard-module-txlog-name: "&6Transaction Log"
dashboard-module-txlog-desc1: "&7Records every buy/sell transaction"
dashboard-module-txlog-desc2: "&7to the database. Required for the"
dashboard-module-txlog-desc3: "&7/shop history command. Disabling"
dashboard-module-txlog-desc4: "&7saves storage but removes auditing."
dashboard-module-salestax-name: "&6Sales Tax"
dashboard-module-salestax-desc1: "&7Enables the sales tax on all shop"
dashboard-module-salestax-desc2: "&7purchases. The tax percentage is"
dashboard-module-salestax-desc3: "&7configured in the General tab."
dashboard-module-salestax-desc4: "&7Disabling removes all purchase tax."
dashboard-module-ahlink-name: "&6AuctionHouse Link"
dashboard-module-ahlink-desc1: "&7Links EconomyShop price data with"
dashboard-module-ahlink-desc2: "&7the AuctionHouse plugin. Shares"
dashboard-module-ahlink-desc3: "&7transaction history and price charts"
dashboard-module-ahlink-desc4: "&7between both systems."
dashboard-module-pricehist-name: "&6Price History"
dashboard-module-pricehist-desc1: "&7Tracks item prices over time and"
dashboard-module-pricehist-desc2: "&7enables visual price charts in the"
dashboard-module-pricehist-desc3: "&7shop GUI. Requires Transaction Log"
dashboard-module-pricehist-desc4: "&7to be enabled for data collection."
dashboard-module-sellcmd-name: "&6Sell Commands"
dashboard-module-sellcmd-desc1: "&7Enables /sell and /sell all commands"
dashboard-module-sellcmd-desc2: "&7for quick selling without opening"
dashboard-module-sellcmd-desc3: "&7the GUI. Useful for fast gameplay."

# Chest shops tab
dashboard-cs-enabled-name: "&6Chest Shops"
dashboard-cs-enabled-desc1: "&7Master toggle for the chest shop"
dashboard-cs-enabled-desc2: "&7system. Disabling prevents creation"
dashboard-cs-enabled-desc3: "&7of new shops and hides browse GUI."
dashboard-cs-enabled-desc4: "&7Existing shops remain in database."
dashboard-cs-display-name: "&6Display Entities"
dashboard-cs-display-desc1: "&7Shows a floating, rotating item"
dashboard-cs-display-desc2: "&7above each chest shop. Makes shops"
dashboard-cs-display-desc3: "&7easier to spot in the world."
dashboard-cs-display-desc4: "&7Toggling respawns/despawns all."
dashboard-cs-rotation-name: "&6Rotation Speed"
dashboard-cs-rotation-desc1: "&7Ticks per rotation step for the"
dashboard-cs-rotation-desc2: "&7floating display item. Higher values"
dashboard-cs-rotation-desc3: "&7make it spin slower. 40 is default."
dashboard-cs-rotation-desc4: "&720 ticks = 1 second in Minecraft."
dashboard-cs-freeitems-name: "&6Allow Free Items"
dashboard-cs-freeitems-desc1: "&7Allows players to list items with"
dashboard-cs-freeitems-desc2: "&7a price of $0 in their chest shop."
dashboard-cs-freeitems-desc3: "&7Useful for giveaway shops."
dashboard-cs-doublechest-name: "&6Allow Double Chests"
dashboard-cs-doublechest-desc1: "&7Allows chest shops to be placed"
dashboard-cs-doublechest-desc2: "&7on double chests, giving shop"
dashboard-cs-doublechest-desc3: "&7owners more stock capacity."
dashboard-cs-stockalert-name: "&6Stock Alert Threshold"
dashboard-cs-stockalert-desc1: "&7Default threshold for low-stock"
dashboard-cs-stockalert-desc2: "&7warnings. Shop owners are notified"
dashboard-cs-stockalert-desc3: "&7when stock drops below this."
dashboard-cs-height-name: "&6Display Height"
dashboard-cs-height-desc1: "&7Height offset (in blocks) of the"
dashboard-cs-height-desc2: "&7floating display entity above the"
dashboard-cs-height-desc3: "&7chest. Adjust if items clip into"
dashboard-cs-height-desc4: "&7blocks above the shop."

# Security tab
dashboard-sec-click-name: "&6Click Cooldown"
dashboard-sec-click-desc1: "&7Minimum milliseconds between GUI"
dashboard-sec-click-desc2: "&7click actions per player. Prevents"
dashboard-sec-click-desc3: "&7rapid click-spam exploits."
dashboard-sec-click-desc4: "&7200ms is a safe default."
dashboard-sec-cmd-name: "&6Command Cooldown"
dashboard-sec-cmd-desc1: "&7Minimum milliseconds between shop"
dashboard-sec-cmd-desc2: "&7command executions per player."
dashboard-sec-cmd-desc3: "&7Prevents command spam and automated"
dashboard-sec-cmd-desc4: "&7abuse. 500ms is recommended."
dashboard-sec-lock-name: "&6Lock Hold Time"
dashboard-sec-lock-desc1: "&7Maximum seconds a transaction lock"
dashboard-sec-lock-desc2: "&7can be held before auto-release."
dashboard-sec-lock-desc3: "&7Prevents deadlocks if the server"
dashboard-sec-lock-desc4: "&7hangs during a transaction."
dashboard-sec-creative-name: "&6Block Creative"
dashboard-sec-creative-desc1: "&7Prevents players in Creative mode"
dashboard-sec-creative-desc2: "&7from using the shop. Stops admins"
dashboard-sec-creative-desc3: "&7from accidentally buying/selling"
dashboard-sec-creative-desc4: "&7while building."

# Actions tab
dashboard-act-reload-name: "&6&lReload Config"
dashboard-act-reload-desc1: "&7Reloads config.yml, language files,"
dashboard-act-reload-desc2: "&7and GUI configurations from disk."
dashboard-act-reload-desc3: "&7Does not restart database connections."
dashboard-act-stats-name: "&6&lView Stats"
dashboard-act-stats-desc1: "&7Shows today's revenue, transaction"
dashboard-act-stats-desc2: "&7count, active shops, and top sellers"
dashboard-act-stats-desc3: "&7in chat."
dashboard-act-purgetx-name: "&c&lPurge Transactions"
dashboard-act-purgetx-desc1: "&7Deletes transaction log entries older"
dashboard-act-purgetx-desc2: "&7than 90 days from the database."
dashboard-act-purgetx-desc3: "&7Frees storage space."
dashboard-act-purgeph-name: "&c&lPurge Price History"
dashboard-act-purgeph-desc1: "&7Deletes price history entries older"
dashboard-act-purgeph-desc2: "&7than 90 days. Auto-purge interval"
dashboard-act-purgeph-desc3: "&7is set in config.yml."

# Stock tab
dashboard-stock-mode-name: "&6Default Stock Mode"
dashboard-stock-mode-desc1: "&7Default stock behavior for newly"
dashboard-stock-mode-desc2: "&7created shop items. Infinite means"
dashboard-stock-mode-desc3: "&7unlimited stock; Limited means items"
dashboard-stock-mode-desc4: "&7restock on a timer."
dashboard-stock-amount-name: "&6Restock Amount"
dashboard-stock-amount-desc1: "&7Number of items added back to stock"
dashboard-stock-amount-desc2: "&7each restock cycle. Only applies to"
dashboard-stock-amount-desc3: "&7items with Limited stock mode."
dashboard-stock-max-name: "&6Max Stock"
dashboard-stock-max-desc1: "&7Default maximum stock capacity for"
dashboard-stock-max-desc2: "&7Limited stock items. Items will not"
dashboard-stock-max-desc3: "&7restock above this amount."
dashboard-stock-interval-name: "&6Restock Interval"
dashboard-stock-interval-desc1: "&7Seconds between each restock cycle"
dashboard-stock-interval-desc2: "&7for Limited stock items. 3600 = one"
dashboard-stock-interval-desc3: "&7hour. Lower values keep items in"
dashboard-stock-interval-desc4: "&7stock more consistently."
dashboard-stock-check-name: "&6Check Interval"
dashboard-stock-check-desc1: "&7How often (in seconds) the plugin"
dashboard-stock-check-desc2: "&7checks which items need restocking."
dashboard-stock-check-desc3: "&7Lower = more responsive but slightly"
dashboard-stock-check-desc4: "&7more CPU usage. 60s is recommended."

# Dynamic Pricing tab
dashboard-dp-model-name: "&6Pricing Model"
dashboard-dp-model-desc1: "&7Pricing algorithm to use."
dashboard-dp-model-desc2: "&fStock-Based&7: price = median/current"
dashboard-dp-model-desc3: "&7stock x base. &aRecommended."
dashboard-dp-model-desc4: "&fMultiplier&7: legacy decay system."
dashboard-dp-median-name: "&6Median Stock"
dashboard-dp-median-desc1: "&7The equilibrium stock level. When"
dashboard-dp-median-desc2: "&7current stock equals median, price"
dashboard-dp-median-desc3: "&7equals base price. Below median ="
dashboard-dp-median-desc4: "&7higher price, above = lower."
dashboard-dp-spread-name: "&6Buy/Sell Spread"
dashboard-dp-spread-desc1: "&7Buy/sell price spread. Sell price ="
dashboard-dp-spread-desc2: "&7buy price x this value. 0.85 means"
dashboard-dp-spread-desc3: "&7a 15% spread. Set to 1.0 to let"
dashboard-dp-spread-desc4: "&7players sell at full buy price."
dashboard-dp-minstock-name: "&6Min Stock"
dashboard-dp-minstock-desc1: "&7Minimum stock level for price calc."
dashboard-dp-minstock-desc2: "&7Prevents prices from going infinitely"
dashboard-dp-minstock-desc3: "&7high. At min 10 with median 500,"
dashboard-dp-minstock-desc4: "&7max price = 50x base."
dashboard-dp-maxstock-name: "&6Max Stock"
dashboard-dp-maxstock-desc1: "&7Maximum stock level for price calc."
dashboard-dp-maxstock-desc2: "&7Prevents prices from dropping to"
dashboard-dp-maxstock-desc3: "&7near-zero. Caps how cheap items"
dashboard-dp-maxstock-desc4: "&7can become from oversupply."
dashboard-dp-rebalance-name: "&6Rebalance Interval"
dashboard-dp-rebalance-desc1: "&7Minutes between stock rebalancing."
dashboard-dp-rebalance-desc2: "&7Stock slowly drifts back toward the"
dashboard-dp-rebalance-desc3: "&7median over time. Lower intervals"
dashboard-dp-rebalance-desc4: "&7mean faster price recovery."
dashboard-dp-rate-name: "&6Rebalance Rate"
dashboard-dp-rate-desc1: "&7Percentage of the gap between"
dashboard-dp-rate-desc2: "&7current stock and median that is"
dashboard-dp-rate-desc3: "&7closed each rebalance. 0.05 = 5%"
dashboard-dp-rate-desc4: "&7drift per interval."
dashboard-dp-minmult-name: "&6Min Multiplier"
dashboard-dp-minmult-desc1: "&7Minimum price multiplier floor."
dashboard-dp-minmult-desc2: "&7Prevents prices from dropping below"
dashboard-dp-minmult-desc3: "&7this fraction of the base price."
dashboard-dp-minmult-desc4: "&70.5 = prices can't go below 50%."
dashboard-dp-maxmult-name: "&6Max Multiplier"
dashboard-dp-maxmult-desc1: "&7Maximum price multiplier ceiling."
dashboard-dp-maxmult-desc2: "&7Prevents prices from exceeding this"
dashboard-dp-maxmult-desc3: "&7multiple of the base price."
dashboard-dp-maxmult-desc4: "&73.0 = prices cap at 300%."
dashboard-dp-protect-name: "&6Protect Last Item"
dashboard-dp-protect-desc1: "&7Prevents buying the last item in"
dashboard-dp-protect-desc2: "&7stock for Limited stock shops."
dashboard-dp-protect-desc3: "&7Keeps at least 1 item so the price"
dashboard-dp-protect-desc4: "&7curve doesn't go to infinity."
